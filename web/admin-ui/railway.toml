[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[nixpacks]

[nixpacks.phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[nixpacks.phases.install]
cmds = ["npm ci"]

[nixpacks.phases.build]
cmds = ["npm run build"]
